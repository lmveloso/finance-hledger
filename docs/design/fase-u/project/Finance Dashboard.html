<!-- ── Shared Components ── -->
<script type="text/babel">
const {createContext,useContext,useState,useEffect}=React;
const ThemeCtx=createContext(null);
const useTheme=()=>useContext(ThemeCtx);
function ThemeProvider({theme,variation,fontPair,children}){
  const t=window.THEME[theme],r=window.THEME.radius[variation],p=window.THEME.padding[variation],f=window.THEME.fonts[fontPair];
  return <ThemeCtx.Provider value={{theme,t,r,p,f,variation,isDark:t.isDark}}>{children}</ThemeCtx.Provider>;
}
function Sparkline({data,color,height=38}){
  if(!data||data.length<2)return null;
  const max=Math.max(...data),min=Math.min(...data),range=max-min||1,W=100,H=height;
  const pts=data.map((v,i)=>[(i/(data.length-1))*W,H-((v-min)/range)*(H-6)-3]);
  const line=pts.map(([x,y],i)=>`${i===0?'M':'L'}${x},${y}`).join(' ');
  const area=`${line} L${W},${H} L0,${H} Z`;
  const uid=`sg${color.replace(/[^a-z0-9]/gi,'')}`;
  return <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height,display:'block'}} preserveAspectRatio="none">
    <defs><linearGradient id={uid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.28"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
    <path d={area} fill={`url(#${uid})`}/><path d={line} stroke={color} strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>;
}
function KpiCard({label,value,color,spark,emphasized,note}){
  const {t,r,p,f,variation}=useTheme();
  return <div style={{background:emphasized&&variation==='rounded'?`linear-gradient(145deg,${color}18 0%,${t.bg.card} 65%)`:t.bg.card,border:emphasized?`1px solid ${color}50`:`1px solid ${t.border.default}`,borderRadius:r.md,padding:p.card,position:'relative',overflow:'hidden'}}>
    {emphasized&&<div style={{position:'absolute',top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${color},${color}00)`}}/>}
    <div style={{fontFamily:f.body,fontSize:10,color:t.text.muted,textTransform:'uppercase',letterSpacing:'0.14em',marginBottom:10}}>{label}</div>
    <div style={{fontFamily:f.display,fontSize:emphasized?34:26,color:emphasized?color:t.text.primary,lineHeight:1,letterSpacing:'-0.02em'}}>{window.BRL(value)}</div>
    {note&&<div style={{fontFamily:f.body,fontSize:11,color:t.text.muted,marginTop:5}}>{note}</div>}
    {spark&&<div style={{marginTop:12}}><Sparkline data={spark} color={emphasized?color:t.text.disabled} height={36}/></div>}
  </div>;
}
function Card({children,title,action,style:sx}){
  const {t,r,p,f}=useTheme();
  return <div style={{background:t.bg.card,border:`1px solid ${t.border.default}`,borderRadius:r.md,padding:p.card,...sx}}>
    {title&&<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
      <span style={{fontFamily:f.body,fontSize:10,color:t.text.muted,textTransform:'uppercase',letterSpacing:'0.14em'}}>{title}</span>{action}
    </div>}
    {children}
  </div>;
}
const NAV_ITEMS=[{id:'resumo',label:'Resumo'},{id:'mes',label:'Mês'},{id:'ano',label:'Ano'},{id:'fluxo',label:'Fluxo'},{id:'orcamento',label:'Orçamento'},{id:'patrimonio',label:'Patrimônio'}];
function Sidebar({active,onNav,onThemeToggle}){
  const {t,r,f,isDark}=useTheme();
  return <aside style={{width:208,minWidth:208,height:'100vh',background:t.bg.sidebar,borderRight:`1px solid ${t.border.default}`,display:'flex',flexDirection:'column',flexShrink:0}}>
    <div style={{padding:'26px 20px 22px',borderBottom:`1px solid ${t.border.subtle}`}}>
      <div style={{fontFamily:f.display,fontSize:20,color:t.text.primary,lineHeight:1.15}}>Finanças</div>
      <div style={{fontFamily:f.display,fontStyle:'italic',fontSize:20,color:t.accent.primary,lineHeight:1.15}}>Pessoais</div>
      <div style={{fontFamily:f.body,fontSize:10,color:t.text.disabled,letterSpacing:'0.18em',textTransform:'uppercase',marginTop:8}}>hledger · família</div>
    </div>
    <nav style={{flex:1,padding:'14px 10px',overflowY:'auto'}}>
      {NAV_ITEMS.map(item=>{const a=active===item.id;return <button key={item.id} onClick={()=>onNav(item.id)} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:r.sm,border:'none',marginBottom:2,transition:'all 0.12s',background:a?t.accent.primaryMuted:'transparent',color:a?t.accent.primary:t.text.secondary,fontFamily:f.body,fontSize:13,fontWeight:a?600:400,textAlign:'left'}}
        onMouseEnter={e=>{if(!a){e.currentTarget.style.background=t.bg.hover;e.currentTarget.style.color=t.text.primary;}}}
        onMouseLeave={e=>{if(!a){e.currentTarget.style.background='transparent';e.currentTarget.style.color=t.text.secondary;}}}>
        <div style={{width:3,height:16,background:a?t.accent.primary:'transparent',borderRadius:2,flexShrink:0}}/>{item.label}
      </button>;})}
    </nav>
    <div style={{padding:'14px 10px',borderTop:`1px solid ${t.border.subtle}`}}>
      <button onClick={onThemeToggle} style={{width:'100%',padding:'8px 12px',borderRadius:r.sm,border:`1px solid ${t.border.default}`,background:'transparent',color:t.text.muted,fontFamily:f.body,fontSize:12,display:'flex',alignItems:'center',gap:8}}>
        {isDark?'☀ Modo claro':'◑ Modo escuro'}
      </button>
    </div>
  </aside>;
}
const MONTH_LABELS=['Jan 2025','Fev 2025','Mar 2025','Abr 2025'];
const TAB_LABELS={resumo:'Resumo',mes:'Mês',ano:'Ano',fluxo:'Fluxo',orcamento:'Orçamento',patrimonio:'Patrimônio'};
function TopBar({active,monthIdx,onMonthChange}){
  const {t,r,f}=useTheme();
  const bs={width:28,height:28,borderRadius:r.xs,border:`1px solid ${t.border.default}`,background:'transparent',color:t.text.secondary,fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'};
  return <header style={{height:56,borderBottom:`1px solid ${t.border.default}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 24px',background:t.bg.card,flexShrink:0}}>
    <span style={{fontFamily:f.body,fontSize:14,fontWeight:600,color:t.text.primary}}>{TAB_LABELS[active]}</span>
    <div style={{display:'flex',alignItems:'center',gap:6}}>
      <button onClick={()=>onMonthChange(Math.max(0,monthIdx-1))} style={bs}>‹</button>
      <span style={{fontFamily:f.body,fontSize:13,color:t.text.primary,minWidth:76,textAlign:'center'}}>{MONTH_LABELS[monthIdx]||'Abr 2025'}</span>
      <button onClick={()=>onMonthChange(Math.min(MONTH_LABELS.length-1,monthIdx+1))} style={bs}>›</button>
    </div>
  </header>;
}
const MOBILE_TABS=[{id:'resumo',label:'Resumo'},{id:'mes',label:'Mês'},{id:'ano',label:'Ano'},{id:'orcamento',label:'Budget'},{id:'patrimonio',label:'Net Worth'}];
function BottomNav({active,onNav}){
  const {t,f}=useTheme();
  return <nav style={{position:'fixed',bottom:0,left:0,right:0,height:58,background:t.bg.sidebar,borderTop:`1px solid ${t.border.default}`,display:'flex',zIndex:200}}>
    {MOBILE_TABS.map(item=>{const a=active===item.id;return <button key={item.id} onClick={()=>onNav(item.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,border:'none',background:'transparent',color:a?t.accent.primary:t.text.muted,fontFamily:f.body,fontSize:9.5,fontWeight:a?600:400}}>
      <div style={{width:18,height:2,borderRadius:1,background:a?t.accent.primary:'transparent',marginBottom:2}}/>{item.label}
    </button>;})}
  </nav>;
}
function TweaksPanel({open,theme,variation,fontPair,onTheme,onVariation,onFont}){
  const {t,r,f}=useTheme();
  if(!open)return null;
  function Chip({label,active,onClick}){return <button onClick={onClick} style={{padding:'5px 11px',borderRadius:r.xs,border:`1px solid ${active?t.accent.primary:t.border.default}`,background:active?t.accent.primaryMuted:'transparent',color:active?t.accent.primary:t.text.secondary,fontFamily:f.body,fontSize:12}}>{label}</button>;}
  const sl={fontFamily:f.body,fontSize:10,color:t.text.muted,textTransform:'uppercase',letterSpacing:'0.12em',marginBottom:8,marginTop:14,display:'block'};
  return <div style={{position:'fixed',bottom:24,right:24,background:t.bg.card,border:`1px solid ${t.border.default}`,borderRadius:r.md,padding:20,width:260,zIndex:1000,boxShadow:`0 28px 64px ${t.isDark?'rgba(0,0,0,.7)':'rgba(10,12,60,.18)'}`}}>
    <div style={{fontFamily:f.display,fontSize:17,color:t.text.primary,marginBottom:4}}>Tweaks</div>
    <span style={{...sl,marginTop:10}}>Tema</span>
    <div style={{display:'flex',gap:6}}><Chip label="Escuro" active={theme==='dark'} onClick={()=>onTheme('dark')}/><Chip label="Claro" active={theme==='light'} onClick={()=>onTheme('light')}/></div>
    <span style={sl}>Variação</span>
    <div style={{display:'flex',gap:6}}><Chip label="Rounded" active={variation==='rounded'} onClick={()=>onVariation('rounded')}/><Chip label="Sharp" active={variation==='sharp'} onClick={()=>onVariation('sharp')}/><Chip label="Compact" active={variation==='compact'} onClick={()=>onVariation('compact')}/></div>
    <span style={sl}>Tipografia</span>
    <div style={{display:'flex',gap:6}}><Chip label="Jakarta" active={fontPair==='jakarta'} onClick={()=>onFont('jakarta')}/><Chip label="Classic" active={fontPair==='classic'} onClick={()=>onFont('classic')}/><Chip label="Grotesk" active={fontPair==='grotesk'} onClick={()=>onFont('grotesk')}/></div>
  </div>;
}
Object.assign(window,{ThemeCtx,useTheme,ThemeProvider,Sparkline,KpiCard,Card,Sidebar,TopBar,BottomNav,TweaksPanel});

<script type="text/babel">
const {useState:useS}=React;
const {useTheme,KpiCard,Card,Sparkline}=window;

/* ── Resumo ── */
function TabResumo(){
  const {t,r,p,f}=window.useTheme();const d=window.MOCK;
  const total=d.categories.reduce((s,c)=>s+c.valor,0);const C=t.chart.colors;
  return <div style={{display:'grid',gap:16}}>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
      <KpiCard label="Receitas"  value={d.summary.receitas} color={t.feedback.positive} spark={d.sparklines.receitas} note="↑ 8% vs mês anterior"/>
      <KpiCard label="Despesas"  value={d.summary.despesas} color={t.feedback.negative} spark={d.sparklines.despesas} note="↑ 2% vs mês anterior"/>
      <KpiCard label="Saldo"     value={d.summary.saldo}    color={t.accent.primary}    spark={d.sparklines.saldo}    emphasized note="Melhor em 4 meses"/>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1.4fr 1fr',gap:14}}>
      <Card title="Despesas por categoria">
        {d.categories.map((cat,i)=>{const pct=(cat.valor/total)*100;const col=C[i%C.length];return <div key={cat.nome} style={{marginBottom:18}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}><div style={{width:8,height:8,borderRadius:2,background:col,flexShrink:0}}/><span style={{fontFamily:f.body,fontSize:13,color:t.text.secondary}}>{cat.nome}</span></div>
            <div style={{display:'flex',alignItems:'baseline',gap:8}}><span style={{fontFamily:f.body,fontSize:11,color:t.text.muted}}>{window.PCT(pct)}</span><span style={{fontFamily:f.display,fontSize:14,color:t.text.primary}}>{window.BRL(cat.valor)}</span></div>
          </div>
          <div style={{height:5,background:t.border.default,borderRadius:999,overflow:'hidden'}}><div style={{height:'100%',width:`${pct}%`,background:col,borderRadius:999,transition:'width .7s ease'}}/></div>
        </div>;})}
        <div style={{marginTop:4,height:8,borderRadius:999,display:'flex',overflow:'hidden',gap:1}}>
          {d.categories.map((c,i)=><div key={c.nome} style={{flex:c.valor,background:C[i%C.length],opacity:.85}} title={c.nome}/>)}
        </div>
      </Card>
      <Card title="Maiores gastos">
        {d.topExpenses.map((tx,i)=><div key={i} style={{padding:'13px 0',borderBottom:i<d.topExpenses.length-1?`1px solid ${t.border.subtle}`:'none'}}>

          <div style={{fontFamily:f.body,fontSize:10,color:t.text.muted,marginTop:3}}>{tx.categoria} · {tx.data}</div>
        </div>)}
      </Card>
    </div>
  </div>;
}

function PrincipleBar({label,target,realized,amount,color}){
  const {t,r,f}=window.useTheme();
  const ratio=target>0?Math.min(realized/target,1.3):0;

function SvgAreaChart({data,keys,colors,height=220}){
  const {t,r,f}=window.useTheme();
  const W=600,H=height-30,PAD={l:40,r:8,t:8,b:22};
  const cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;
  const allVals=data.flatMap(d=>keys.map(k=>d[k]||0));
  const yMax=Math.max(...allVals)*1.08,yMin=0;
  const xStep=cW/(data.length-1);
  const toX=i=>PAD.l+i*xStep;
  const toY=v=>PAD.t+cH-(((v-yMin)/(yMax-yMin))*cH);
  const labelInterval=Math.ceil(data.length/6);
  return <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height}} preserveAspectRatio="none">
    <defs>
      {keys.map((k,ki)=><linearGradient key={k} id={`ac${ki}`} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={colors[ki]} stopOpacity={ki===keys.length-1?.3:.15}/>
        <stop offset="100%" stopColor={colors[ki]} stopOpacity="0"/>
      </linearGradient>)}
    </defs>
    {/* Y gridlines */}
    {[0,.25,.5,.75,1].map(f=>{
      const y=PAD.t+cH*(1-f);
      return <g key={f}>
        <line x1={PAD.l} x2={W-PAD.r} y1={y} y2={y} stroke={t.border.subtle} strokeWidth="1"/>
        <text x={PAD.l-4} y={y+4} textAnchor="end" fontSize="9" fill={t.text.disabled} fontFamily="system-ui">{`${Math.round((yMin+(yMax-yMin)*f)/1000)}k`}</text>
      </g>;
    })}
    {/* Area fills */}
    {keys.map((k,ki)=>{
      const pts=data.map((d,i)=>[toX(i),toY(d[k]||0)]);
      const area=`M${pts[0][0]},${pts[0][1]} ${pts.slice(1).map(([x,y])=>`L${x},${y}`).join(' ')} L${pts[pts.length-1][0]},${PAD.t+cH} L${pts[0][0]},${PAD.t+cH} Z`;
      return <path key={k} d={area} fill={`url(#ac${ki})`}/>;
    })}
    {/* Lines */}
    {keys.map((k,ki)=>{
      const pts=data.map((d,i)=>[toX(i),toY(d[k]||0)]);
      const line=`M${pts[0][0]},${pts[0][1]} ${pts.slice(1).map(([x,y])=>`L${x},${y}`).join(' ')}`;
      return <path key={k} d={line} stroke={colors[ki]} strokeWidth={ki===keys.length-1?2:1.2} fill="none" strokeOpacity={ki===keys.length-1?1:.6} strokeDasharray={k==='passivos'?'4 2':''}/>;
    })}
    {/* X labels */}
    {data.map((d,i)=>i%labelInterval===0&&<text key={i} x={toX(i)} y={H-2} textAnchor="middle" fontSize="9" fill={t.text.disabled} fontFamily="system-ui">{d.label}</text>)}
  </svg>;
}

function TabPatrimonio(){
  const {t,r,p,f}=window.useTheme();const d=window.MOCK;const nw=d.networth;
  const latest=nw[nw.length-1],prev=nw[nw.length-2],delta=latest.liquido-prev.liquido;
  const ativos=d.accounts.filter(a=>a.tipo==='ativo'),passivos=d.accounts.filter(a=>a.tipo==='passivo');
  const totA=ativos.reduce((s,a)=>s+a.saldo,0),totP=Math.abs(passivos.reduce((s,a)=>s+a.saldo,0));
  const chartColors=[t.feedback.positive,t.feedback.negative,t.accent.primary];
  return <div style={{display:'grid',gap:16}}>
    <div style={{background:`linear-gradient(135deg,${t.accent.primary}18 0%,${t.bg.card} 60%)`,border:`1px solid ${t.accent.primary}44`,borderRadius:r.md,padding:p.card,position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${t.accent.primary},${t.accent.secondary})`}}/>
      <div style={{fontFamily:f.body,fontSize:10,color:t.text.muted,textTransform:'uppercase',letterSpacing:'0.14em',marginBottom:10}}>Patrimônio líquido</div>
      <div style={{fontFamily:f.display,fontSize:52,color:t.accent.primary,letterSpacing:'-0.03em',lineHeight:1}}>{window.BRL(latest.liquido)}</div>
      <div style={{fontFamily:f.body,fontSize:13,color:delta>=0?t.feedback.positive:t.feedback.negative,marginTop:10}}>{delta>=0?'↑':'↓'} {window.BRL(Math.abs(delta))} vs mês anterior</div>
      <div style={{display:'flex',gap:32,marginTop:20}}>
        <div><div style={{fontFamily:f.body,fontSize:10,color:t.text.muted,marginBottom:4,textTransform:'uppercase',letterSpacing:'0.1em'}}>Ativos</div><div style={{fontFamily:f.display,fontSize:24,color:t.feedback.positive}}>{window.BRL(totA)}</div></div>
        <div><div style={{fontFamily:f.body,fontSize:10,color:t.text.muted,marginBottom:4,textTransform:'uppercase',letterSpacing:'0.1em'}}>Passivos</div><div style={{fontFamily:f.display,fontSize:24,color:t.feedback.negative}}>{window.BRL(totP)}</div></div>
      </div>
    </div>
    <Card title="Evolução patrimonial · 24 meses">
      <SvgAreaChart data={nw} keys={['ativos','passivos','liquido']} colors={chartColors} height={220}/>
      <div style={{display:'flex',gap:20,marginTop:10,flexWrap:'wrap'}}>
        {[{c:t.accent.primary,l:'Patrimônio líquido'},{c:t.feedback.positive,l:'Ativos'},{c:t.feedback.negative,l:'Passivos',d:true}].map(({c,l,d})=><div key={l} style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:20,height:2,background:c,opacity:d?.5:1,borderTop:d?`2px dashed ${c}`:'none'}}/><span style={{fontFamily:f.body,fontSize:11,color:t.text.muted}}>{l}</span></div>)}
      </div>
    </Card>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
      <Card title="Ativos">
        {ativos.map((a,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',padding:'11px 0',borderBottom:i<ativos.length-1?`1px solid ${t.border.subtle}`:'none'}}><span style={{fontFamily:f.body,fontSize:13,color:t.text.secondary}}>{a.nome}</span><span style={{fontFamily:f.display,fontSize:14,color:t.feedback.positive}}>{window.BRL(a.saldo)}</span></div>)}
        <div style={{marginTop:14,paddingTop:12,borderTop:`1px solid ${t.border.default}`,display:'flex',justifyContent:'space-between'}}><span style={{fontFamily:f.body,fontSize:12,color:t.text.muted}}>Total ativos</span><span style={{fontFamily:f.display,fontSize:16,color:t.feedback.positive}}>{window.BRL(totA)}</span></div>
      </Card>
      <Card title="Passivos">
        {passivos.map((a,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',padding:'11px 0',borderBottom:i<passivos.length-1?`1px solid ${t.border.subtle}`:'none'}}><span style={{fontFamily:f.body,fontSize:13,color:t.text.secondary}}>{a.nome}</span><span style={{fontFamily:f.display,fontSize:14,color:t.feedback.negative}}>{window.BRL(Math.abs(a.saldo))}</span></div>)}
        <div style={{marginTop:14,paddingTop:12,borderTop:`1px solid ${t.border.default}`,display:'flex',justifyContent:'space-between'}}><span style={{fontFamily:f.body,fontSize:12,color:t.text.muted}}>Total passivos</span><span style={{fontFamily:f.display,fontSize:16,color:t.feedback.negative}}>{window.BRL(totP)}</span></div>
      </Card>
    </div>
  </div>;
}

Object.assign(window,{TabResumo,TabMes,TabAno,TabFluxo,TabOrcamento,TabPatrimonio});
</script>

<!-- ── App ── -->
<script type="text/babel">
const {useState:useAS,useEffect:useAE}=React;
const {ThemeProvider,Sidebar,TopBar,BottomNav,TweaksPanel,TabResumo,TabMes,TabAno,TabFluxo,TabOrcamento,TabPatrimonio}=window;
const TWEAK_DEFAULTS=/*EDITMODE-BEGIN*/{
  "theme": "light",
  "variation": "sharp",
  "fontPair": "grotesk"
}/*EDITMODE-END*/;
function App(){
  const saved=()=>{try{return JSON.parse(localStorage.getItem('fp-tw')||'{}');}catch{return{};}};
  const [theme,setTheme]=useAS(saved().theme||TWEAK_DEFAULTS.theme);
  const [variation,setVariation]=useAS(saved().variation||TWEAK_DEFAULTS.variation);
  const [fontPair,setFontPair]=useAS(saved().fontPair||TWEAK_DEFAULTS.fontPair);
  const [activeTab,setActiveTab]=useAS(localStorage.getItem('fp-tab')||'resumo');
  const [monthIdx,setMonthIdx]=useAS(3);
  const [tweaksOpen,setTweaksOpen]=useAS(false);
  useAE(()=>{localStorage.setItem('fp-tw',JSON.stringify({theme,variation,fontPair}));},[theme,variation,fontPair]);
  useAE(()=>{localStorage.setItem('fp-tab',activeTab);},[activeTab]);
  useAE(()=>{
    const h=e=>{if(e.data?.type==='__activate_edit_mode')setTweaksOpen(true);if(e.data?.type==='__deactivate_edit_mode')setTweaksOpen(false);};
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);
  const send=(k,v)=>window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[k]:v}},'*');
  const T=window.THEME[theme];
  const tabs={resumo:<TabResumo/>,mes:<TabMes/>,ano:<TabAno/>,fluxo:<TabFluxo/>,orcamento:<TabOrcamento/>,patrimonio:<TabPatrimonio/>};
  return <ThemeProvider theme={theme} variation={variation} fontPair={fontPair}>
    <style>{`body{background:${T.bg.page}}button{cursor:pointer}::-webkit-scrollbar-thumb{background:${T.border.default}}`}</style>
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <div id="sb" style={{display:'none'}}><Sidebar active={activeTab} onNav={setActiveTab} onThemeToggle={()=>{const v=theme==='dark'?'light':'dark';setTheme(v);send('theme',v);}}/></div>
      <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,overflow:'hidden'}}>
        <TopBar active={activeTab} monthIdx={monthIdx} onMonthChange={setMonthIdx}/>
        <main style={{flex:1,overflowY:'auto',padding:'20px 24px 80px',background:T.bg.page}}>{tabs[activeTab]||null}</main>
      </div>
    </div>
    <TweaksPanel open={tweaksOpen} theme={theme} variation={variation} fontPair={fontPair}
      onTheme={v=>{setTheme(v);send('theme',v);}} onVariation={v=>{setVariation(v);send('variation',v);}} onFont={v=>{setFontPair(v);send('fontPair',v);}}/>
    <BottomNav active={activeTab} onNav={setActiveTab}/>
    <style>{`@media(min-width:769px){#sb{display:block!important}main{padding-bottom:24px!important}}@media(max-width:768px){main{padding:16px 16px 72px}}`}</style>
  </ThemeProvider>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
